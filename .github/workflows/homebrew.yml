name: Homebrew

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-install:
    name: Test brew install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install from tap
        run: |
          brew tap dravr-ai/tap
          brew install dravr-sciotte

      - name: Verify binaries exist
        run: |
          dravr-sciotte-server --version
          dravr-sciotte-mcp --version

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SERVER_VERSION=$(dravr-sciotte-server --version | awk '{print $2}')
          MCP_VERSION=$(dravr-sciotte-mcp --version | awk '{print $2}')
          echo "Tag: ${TAG}, Server: ${SERVER_VERSION}, MCP: ${MCP_VERSION}"
          [ "$SERVER_VERSION" = "$TAG" ] || { echo "Server version mismatch"; exit 1; }
          [ "$MCP_VERSION" = "$TAG" ] || { echo "MCP version mismatch"; exit 1; }

      - name: Smoke test — server starts and serves health endpoint
        run: |
          dravr-sciotte-server serve --port 9876 &
          SERVER_PID=$!

          # Wait for the server to be ready (up to 10 seconds)
          for i in $(seq 1 20); do
            if curl -sf http://localhost:9876/health >/dev/null 2>&1; then
              echo "Server is up after $((i / 2))s"
              break
            fi
            sleep 0.5
          done

          # Verify health endpoint returns JSON
          HEALTH=$(curl -sf http://localhost:9876/health)
          echo "Health response: ${HEALTH}"
          echo "${HEALTH}" | grep -q '"status"' || { echo "Health missing status"; kill $SERVER_PID; exit 1; }

          kill $SERVER_PID
          echo "Server smoke test passed"
