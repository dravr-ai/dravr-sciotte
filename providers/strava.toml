# Provider configuration for Strava (www.strava.com)
# Defines login flow, list page selectors, and detail page JS extraction

[provider]
name = "strava"
login_url = "https://www.strava.com/login"
login_success_patterns = ["/dashboard", "/athlete", "/onboarding", "strava.com/feed"]
login_failure_patterns = ["/login", "/session", "/oauth"]
login_email_selector = '#email, input[name="email"]'
login_password_selector = '#password, input[name="password"]'
login_button_selector = 'button[type="submit"], #login-button'
login_error_selector = '.alert-error, .alert-danger, [class*="error-message"]'
login_otp_selector = 'input[name="code"], input[type="tel"], input[autocomplete="one-time-code"]'
vision_page_analysis_prompt = "providers/strava/page_analysis.md"
profile_url = "https://www.strava.com/athlete"
profile_js_extract = '''
(function() {
    var data = {};
    var name = document.querySelector('.athlete-name, h1.text-title1');
    if (name) data.display_name = name.textContent.trim();
    var avatar = document.querySelector('.avatar-img, img.avatar');
    if (avatar) data.profile_picture_url = avatar.src;
    var loc = document.querySelector('.location');
    if (loc) {
        var parts = loc.textContent.trim().split(',');
        if (parts[0]) data.city = parts[0].trim();
        if (parts[1]) data.country = parts[1].trim();
    }
    return JSON.stringify(data);
})()
'''

[provider.login_oauth_buttons]
google = 'text:Sign In With Google'
apple = 'text:Sign In With Apple'

[list_page]
url = "https://www.strava.com/athlete/training"
row_selector = "tr.training-activity-row"
link_selector = 'a[data-field-name="name"]'
id_regex = '/\/activities\/(\d+)/'
vision_prompt = "providers/strava/list_page.md"

[list_page.fields]
name = 'a[data-field-name="name"]'
sport_type = 'td[data-field-name="sport_type"]'
date = "td.col-date"
time = 'td[data-field-name="time"]'
distance = "td.col-dist"
elevation = "td.col-elev"
suffer_score = "td.col-suffer-score"

[detail_page]
url_template = "https://www.strava.com/activities/{id}"
js_extract = '''
(function() {
    const data = {};

    // Activity name from h2 or second heading
    const headings = document.querySelectorAll('h1, h2');
    headings.forEach(function(h) {
        const text = h.textContent.trim();
        if (text.includes('\u2013') || text.includes('-')) {
            // h1 format: "Athlete Name \u2013 Trail Run" or "Athlete Name - Trail Run"
            const sep = text.includes('\u2013') ? '\u2013' : '-';
            data.type = text.split(sep).pop().trim();
        } else if (!data.name && !text.includes('Recent') && !text.includes('Strava')) {
            data.name = text;
        }
    });

    // Primary inline stats: Distance, Moving Time, Pace, Relative Effort, Speed, HR, Power, Cadence
    document.querySelectorAll('ul.inline-stats li').forEach(function(li) {
        const text = li.textContent.trim();
        if (text.includes('Distance')) {
            data.distance = text.replace('Distance', '').trim();
        } else if (text.includes('Moving Time') || text.includes('de d\u00e9placement')) {
            data.moving_time = text.replace(/Moving Time|Dur\u00e9e de d\u00e9placement/i, '').trim();
        } else if (text.includes('Pace') || text.includes('Allure')) {
            data.pace = text.replace(/Pace|Allure/i, '').trim();
        } else if (text.includes('Relative Effort') || text.includes('Effort relat')) {
            data.relative_effort = text.replace(/Relative Effort|Effort relatif/i, '').trim();
        } else if (text.includes('Speed') || text.includes('Vitesse')) {
            data.avg_speed = text.replace(/Speed|Vitesse/i, '').trim();
        } else if (text.includes('Avg HR') || text.includes('FC moy')) {
            data.avg_hr = text.replace(/Avg HR|FC moy\.?/i, '').trim();
        } else if (text.includes('Max HR') || text.includes('FC max')) {
            data.max_hr = text.replace(/Max HR|FC max\.?/i, '').trim();
        } else if (text.includes('Power') || text.includes('Puissance')) {
            data.avg_power = text.replace(/Power|Puissance/i, '').trim();
        } else if (text.includes('Cadence')) {
            data.cadence = text.replace('Cadence', '').trim();
        }
    });

    // Secondary stats: Elevation, Calories, Elapsed Time
    const moreStats = document.querySelector('div.more-stats');
    if (moreStats) {
        const text = moreStats.textContent;
        const elevMatch = text.match(/(?:Elevation|D\u00e9nivel\u00e9 positif)\s*([\d,.]+)\s*m/i);
        if (elevMatch) data.elevation = elevMatch[1];
        const calMatch = text.match(/(?:Calories|Calories)\s*([\d,.]+)/i);
        if (calMatch) data.calories = calMatch[1];
        const elapsedMatch = text.match(/(?:Elapsed Time|Temps \u00e9coul\u00e9)\s*([\d:]+)/i);
        if (elapsedMatch) data.elapsed_time = elapsedMatch[1];
    }

    // Weather stats (English and French)
    document.querySelectorAll('div.weather-stat').forEach(function(stat) {
        const text = stat.textContent.trim();
        if (/^(Clear|Cloudy|Overcast|Rain|Snow|D\u00e9gag|Nuageux|Couvert|Pluie|Neige)/i.test(text) && !text.includes('\u00b0')) {
            data.weather = text;
        } else if (/Temp\u00e9rature|Temperature/i.test(text)) {
            data.temperature = text.replace(/Temp\u00e9rature|Temperature/i, '').trim();
        } else if (/Humidit\u00e9|Humidity/i.test(text)) {
            data.humidity = text.replace(/Humidit\u00e9|Humidity/i, '').trim();
        } else if (/Ressenti|Feels like/i.test(text)) {
            data.feels_like = text.replace(/Ressenti|Feels like/i, '').trim();
        } else if (/Vitesse du vent|Wind Speed/i.test(text)) {
            data.wind_speed = text.replace(/Vitesse du vent|Wind Speed/i, '').trim();
        } else if (/Direction du vent|Wind Direction/i.test(text)) {
            data.wind_direction = text.replace(/Direction du vent|Wind Direction/i, '').trim();
        }
    });

    // Location from the date/location line
    const timeEl = document.querySelector('time');
    if (timeEl) {
        const container = timeEl.closest('div') || timeEl.parentElement;
        if (container) {
            const fullText = container.textContent.trim();
            const dashIdx = fullText.lastIndexOf(' - ');
            if (dashIdx > 0) {
                data.location = fullText.substring(dashIdx + 3).trim();
            }
        }
    }

    // Device name
    const allText = document.body.textContent;
    const devMatch = allText.match(/(?:Garmin|Apple Watch|Wahoo|Polar|Suunto|COROS|Fitbit|Samsung)[^\n,]*/i);
    if (devMatch) data.device = devMatch[0].trim();

    // Gear/shoes — extract from the gear section (div.gear span.gear-name)
    var gearName = document.querySelector('.gear .gear-name, .gear-name');
    if (gearName) {
        data.gear = gearName.textContent.trim().replace(/\s+/g, ' ');
    }

    // Perceived exertion
    const peMatch = allText.match(/(?:Perceived Exertion|Effort ressenti)\s*:?\s*([\w\s\u00e9]+?)(?:\n|$)/i);
    if (peMatch) data.perceived_exertion = peMatch[1].trim();

    // Try to extract structured data from the embedded activity JSON
    // Strava embeds a rich JSON blob via .similarActivitiesData() or pageView data
    var scripts = document.querySelectorAll('script');
    for (var s = 0; s < scripts.length; s++) {
        var src = scripts[s].textContent || '';
        var jsonMatch = src.match(/activity_values.*?"values"\s*:\s*(\{[^}]+\})/);
        if (jsonMatch) {
            try {
                var vals = JSON.parse(jsonMatch[1]);
                if (!data.avg_hr && vals.avg_hr) data.avg_hr = String(vals.avg_hr);
                if (!data.max_hr && vals.max_hr) data.max_hr = String(vals.max_hr);
                if (!data.cadence && vals.avg_cadence) data.cadence = String(vals.avg_cadence);
                if (!data.max_cadence) data.max_cadence = String(vals.max_cadence || '');
                if (!data.calories && vals.calories) data.calories = String(vals.calories);
                if (!data.elevation && vals.elev_gain) data.elevation = String(vals.elev_gain);
                if (vals.max_speed) data.max_speed = String(vals.max_speed);
                if (vals.avg_speed) data.avg_speed_ms = String(vals.avg_speed);
                if (vals.elapsed_time) data.elapsed_time_secs = String(vals.elapsed_time);
                if (vals.total_steps) data.total_steps = String(vals.total_steps);
                if (vals.grade_adjusted_distance) data.gap_distance = String(vals.grade_adjusted_distance);
            } catch(e) {}
            break;
        }
    }

    // Fallback: search page text for HR/cadence if not found in JSON
    if (!data.avg_hr) {
        var hrMatch = allText.match(/(\d+)\s*bpm/i);
        if (hrMatch) data.avg_hr = hrMatch[1];
    }
    if (!data.cadence) {
        var cadMatch = allText.match(/(\d+)\s*(?:ppm|rpm|spm)/i);
        if (cadMatch) data.cadence = cadMatch[1];
    }

    // GAP / VAP
    var gapMatch = allText.match(/(?:VAP|GAP)\s+([\d:]+\s*\/km)/i);
    if (gapMatch) data.gap = gapMatch[1].trim();

    return JSON.stringify(data);
})()
'''
vision_prompt = "providers/strava/detail_page.md"

# Fitness & Freshness page — shows current fitness, fatigue, and form scores
# No date parameter — always shows current values
[health_pages.fitness]
url_template = "https://www.strava.com/athlete/fitness"
js_extract = '''
(function() {
    var data = {};
    var stats = document.querySelectorAll('div.stat');
    stats.forEach(function(stat) {
        var label = stat.querySelector('p.data-label');
        var value = stat.querySelector('div.stat-text.current-fitness-values');
        if (!label || !value) return;
        var key = label.textContent.trim().toLowerCase();
        var val = value.textContent.trim();
        if (key === 'fitness') data.fitness = val;
        else if (key === 'fatigue') data.fatigue = val;
        else if (key === 'form') data.form = val;
    });
    return JSON.stringify(data);
})()
'''
