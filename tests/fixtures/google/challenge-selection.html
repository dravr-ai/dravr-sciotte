<!DOCTYPE html>
<html>
<head><title>Choose how to sign in</title></head>
<body>
  <h1>Choose how you want to sign in:</h1>
  <div data-challengetype="1" onclick="window.location='/google/challenge-pwd.html'">
    Enter your password
  </div>
  <div data-challengetype="53" onclick="return false;">
    Use your passkey
  </div>
  <div data-challengetype="39" onclick="window.location='/strava/dashboard.html'">
    Tap Yes on your phone or tablet
  </div>
  <div data-challengetype="6" onclick="window.location='/google/challenge-totp.html'">
    Get a verification code from the Google Authenticator app
  </div>
  <a href="#">Try another way</a>
</body>
</html>
